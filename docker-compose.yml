version: '3'

services:
  mcp-inspector:
    container_name: inspector
    build:
      context: ./mcpinspector
      dockerfile: Dockerfile
    ports:
      - "6274:6274"  # Client UI
      - "6277:6277"  # MCP proxy server
    networks:
      - services-net
    environment:
      - HOST=0.0.0.0
      - DANGEROUSLY_OMIT_AUTH=true
    volumes:
       - ./mcpinspector/mcp/server:/app/server

  mcp-nodejs-server:
    container_name: nodejs-server
    env_file:
      - ./mcp-nodejs-server/.env
    build:
      context: ./mcp-nodejs-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - services-net
    volumes:
      - ./mcp-nodejs-server/src:/app/src
      - /app/node_modules
      - ./mcp-nodejs-server/tsconfig.json:/app/tsconfig.json:ro
      - ./mcp-nodejs-server/package.json:/app/package.json:ro
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: npx nodemon --watch src --ext ts,json --exec ts-node src/index.ts

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - services-net
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - ollama
      - mcp-nodejs-server  # ← AJOUTÉ : attend que nodejs-server soit prêt
    ports:
      - "3003:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=changeme
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - host.docker.internal:host-gateway
      - "nodejs-server:172.21.0.5"  # ← FIX : IP fixe de ton nodejs-server
    networks:
      - services-net  # ← AJOUTÉ : même réseau que nodejs-server
    restart: unless-stopped

  proxy:
    container_name: proxy
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./proxy/src:/app/src
      - /app/node_modules
      - ./proxy/tsconfig.json:/app/tsconfig.json:ro
      - ./proxy/package.json:/app/package.json:ro
    networks:
      - services-net
    depends_on:
      - ollama
      - mcp-nodejs-server
    command: npx nodemon --watch src --ext ts,json --exec ts-node src/index.ts

  frontend:
    container_name: frontend-dev
    build: ./frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app  # Live code sync
      - /app/node_modules  # Ignore node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true  # File watching
    command: npm run dev  # Dev server
    networks:
      - services-net
    depends_on:
      - proxy
      - ollama

networks:
  services-net:
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
